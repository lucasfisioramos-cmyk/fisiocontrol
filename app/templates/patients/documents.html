{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>Documentos</h1>

        <a href="{{ url_for('patients.patient_profile', id=patient_id) }}"
           class="btn btn-outline-secondary">
            Voltar ao Perfil
        </a>

    </div>

    <div class="card shadow-sm rounded-4 mb-4">

        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">

                <div class="mb-3">

                    <label class="form-label">
                        Selecionar Arquivo
                    </label>

                    <input
                        type="file"
                        class="form-control"
                        name="document">

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Descrição
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="description"
                        placeholder="Ex.: Ressonância lombar 2026">

                </div>

                <button
                    type="submit"
                    class="btn btn-success">
                    Enviar Documento
                </button>

            </form>

        </div>

    </div>

    <div class="card shadow-sm rounded-4">

        <div class="card-body">

            <table class="table table-hover">

                <thead>

                    <tr>
                        <th>Data</th>
                        <th>Descrição</th>
                        <th>Arquivo</th>
                        <th>Ações</th>
                    </tr>

                </thead>

                <tbody>

                    <tr>
                        <td>25/05/2026</td>
                        <td>Ressonância Lombar</td>
                        <td>ressonancia.pdf</td>

                        <td>
                            <button class="btn btn-outline-primary btn-sm">
                                Visualizar
                            </button>

                            <button class="btn btn-outline-danger btn-sm">
                                Excluir
                            </button>
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
