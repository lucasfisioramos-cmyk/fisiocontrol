{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Pacientes</h1>
        <a href="{{ url_for('patients.patient_form') }}"
        class="btn btn-success">Novo Paciente</a>
    </div>

    <div class="card shadow-sm p-4">

        <table class="table table-condensed">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Telefone</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody>

        {% for patient in patients %}

        <tr>

            <td>
                {{ patient.full_name }}
            </td>

            <td>
                {{ patient.phone or '-' }}
            </td>

            <td>

                {% if patient.is_active %}

                <span class="badge bg-success">
                    Ativo
                </span>

                {% else %}

                <span class="badge bg-danger">
                    Inativo
                </span>

                {% endif %}

            </td>

            <td>
                <a
                    href="{{ url_for('patients.patient_profile', id=patient.id) }}"
                    class="btn btn-outline-success btn-sm">

                    Visualizar

                </a>

            </td>

        </tr>

        {% endfor %}

        </tbody>
        </table>

    </div>

</div>

{% endblock %}
