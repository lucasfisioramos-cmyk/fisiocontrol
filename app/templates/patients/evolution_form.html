{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Nova Evolução</h1>

        <a href="{{ url_for('patients.evolution_list', id=patient_id) }}"
           class="btn btn-outline-secondary">
            Voltar
        </a>
    </div>

    <div class="card shadow-sm rounded-4">

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Descrição da Sessão
                    </label>

                    <textarea
                        name="description"
                        rows="10"
                        class="form-control"
                        placeholder="Descreva os procedimentos realizados, resposta do paciente, orientações e evolução clínica..."></textarea>

                </div>

                <div class="d-flex justify-content-end">

                    <button
                        type="submit"
                        class="btn btn-success">
                        Salvar Evolução
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
