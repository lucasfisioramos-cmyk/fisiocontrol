{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>Atendimentos</h1>

        <a href="{{ url_for('patients.patient_profile', id=patient_id) }}"
           class="btn btn-outline-secondary">
            Voltar ao Perfil
        </a>

    </div>

    <div class="card shadow-sm rounded-4">

        <div class="card-body">

            <table class="table table-hover">

                <thead>

                    <tr>
                        <th>Data</th>
                        <th>Horário</th>
                        <th>Status</th>
                        <th>Observações</th>
                    </tr>

                </thead>

                <tbody>

                    <tr>
                        <td>10/06/2026</td>
                        <td>08:00</td>
                        <td>
                            <span class="badge bg-success">
                                Confirmado
                            </span>
                        </td>
                        <td>Sessão de Pilates</td>
                    </tr>

                    <tr>
                        <td>03/06/2026</td>
                        <td>08:00</td>
                        <td>
                            <span class="badge bg-secondary">
                                Realizado
                            </span>
                        </td>
                        <td>Evolução clínica</td>
                    </tr>

                    <tr>
                        <td>27/05/2026</td>
                        <td>08:00</td>
                        <td>
                            <span class="badge bg-danger">
                                Faltou
                            </span>
                        </td>
                        <td>Sem justificativa</td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
