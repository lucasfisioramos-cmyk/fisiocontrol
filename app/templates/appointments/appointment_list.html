{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>Agendamentos</h1>

        <a href="/appointments/new" class="btn btn-success">
            Novo Agendamento
        </a>

    </div>

    <div class="card shadow-sm border-0 rounded-4 p-4">

        <table class="table">

            <thead>
                <tr>
                    <th>Paciente</th>
                    <th>Data</th>
                    <th>Status</th>
                    <th></th>
                </tr>
            </thead>

            <tbody>

                {% for appointment in appointments %}

                <tr>

                    <td>
                        {{ appointment.patient.full_name }}
                    </td>

                    <td>
                        {{ appointment.appointment_date }}
                    </td>

                    <td>
                        {{ appointment.status }}
                    </td>

                    <td>

                        <a href="{{ url_for('appointments.appointment_detail',
                    id=appointment.id) }}" class="btn btn-sm btn-outline-primary">

                            Visualizar

                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
