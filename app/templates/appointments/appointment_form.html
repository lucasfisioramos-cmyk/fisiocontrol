{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>Novo Agendamento</h1>

        <a href="{{ url_for('appointments.appointment_list') }}"
           class="btn btn-outline-secondary">
            Voltar
        </a>

    </div>

    <div class="card shadow-sm rounded-4">

        <div class="card-body">

            <form method="POST">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Paciente
                        </label>

                        <select
                            name="patient_id"
                            class="form-select"
                            required>

                            <option value="">
                                Selecione um paciente
                            </option>

                            {% for patient in patients %}

                            <option value="{{ patient.id }}">
                                {{ patient.full_name }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Status
                        </label>

                        <select
                            name="status"
                            class="form-select">

                            <option value="scheduled">
                                Agendado
                            </option>

                            <option value="confirmed">
                                Confirmado
                            </option>

                        </select>

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Data e Hora
                    </label>

                    <input
                        type="datetime-local"
                        name="appointment_date"
                        class="form-control"
                        required>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Observações
                    </label>

                    <textarea
                        name="notes"
                        rows="5"
                        class="form-control"></textarea>

                </div>

                <div class="d-flex justify-content-end">

                    <button
                        type="submit"
                        class="btn btn-success">

                        Salvar Agendamento

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
