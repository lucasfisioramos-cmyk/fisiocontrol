{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>Novo Lançamento Financeiro</h1>

        <a href="{{ url_for('financial.financial_list') }}"
           class="btn btn-outline-secondary">
            Voltar
        </a>

    </div>

    <div class="card shadow-sm rounded-4">

        <div class="card-body">

            <form method="POST">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Paciente (Opcional)
                        </label>

                        <select
                            name="patient_id"
                            class="form-select">

                            <option value="">
                                Sem paciente vinculado
                            </option>

                            {% for patient in patients %}

                            <option value="{{ patient.id }}">
                                {{ patient.full_name }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Tipo de Lançamento
                        </label>

                        <select
                            name="transaction_type"
                            class="form-select"
                            required>

                            <option value="">
                                Selecione
                            </option>

                            <option value="income">
                                Receita
                            </option>

                            <option value="expense">
                                Despesa
                            </option>

                        </select>

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Descrição
                    </label>

                    <input
                        type="text"
                        name="description"
                        class="form-control"
                        required>

                </div>

                <div class="row">

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Valor (R$)
                        </label>

                        <input
                            type="number"
                            step="0.01"
                            min="0"
                            name="amount"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Vencimento
                        </label>

                        <input
                            type="date"
                            name="due_date"
                            class="form-control">

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Data do Pagamento
                        </label>

                        <input
                            type="date"
                            name="payment_date"
                            class="form-control">

                    </div>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Status
                    </label>

                    <select
                        name="status"
                        class="form-select">

                        <option value="pending">
                            Pendente
                        </option>

                        <option value="paid">
                            Pago
                        </option>

                        <option value="cancelled">
                            Cancelado
                        </option>

                    </select>

                </div>

                <div class="d-flex justify-content-end">

                    <button
                        type="submit"
                        class="btn btn-success">

                        Salvar Lançamento

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
