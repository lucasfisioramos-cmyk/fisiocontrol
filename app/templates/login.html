{% extends 'base.html' %}

{% set hide_layout = True %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="login-container">

        <div class="login-card">

                <img src="{{ url_for('static', filename='img/logo.png') }}" width="140" class="mb-4">

                <h2 class="mb-4">
                        Login
                </h2>

                <form method="POST">

                {{ form.hidden_tag() }}

                <div class="mb-3">
                        {{ form.email.label }}
                        {{ form.email(class="form-control") }}
                </div>

                <div class="mb-3">
                        {{ form.password.label }}
                        {{ form.password(class="form-control") }}
                </div>

                <button
                        class="btn btn-primary"
                        type="submit">

                        Entrar

                </button>

                </form>

        </div>

</div>

{% endblock %}
