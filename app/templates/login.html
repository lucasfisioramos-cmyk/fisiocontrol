{% extends 'base.html' %}

{% set hide_sidebar = True %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="login-container">

        <div class="login-card">

                <img src="{{ url_for('static', filename='img/logo.png') }}" width="140" class="mb-4">

                <h2 class="mb-4">
                        Entrar
                </h2>

                <form>

                        <div class="mb-3">

                                <label>Email</label>

                                <input type="email" class="form-control">

                        </div>

                        <div class="mb-4">

                                <label>Senha</label>

                                <input type="password" class="form-control">

                        </div>

                        <button class="btn btn-success w-100">
                                Entrar
                        </button>

                </form>

        </div>

</div>
